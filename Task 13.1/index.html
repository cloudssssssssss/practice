<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HW 13.1 - SVG Фігури та Анімація</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            margin: 0;
        }

        h1 { color: #333; margin-bottom: 40px; }

        .canvas {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 40px;
            width: 100%;
            max-width: 1000px;
            justify-items: center;
        }

        .shape-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            text-align: center;
        }

        p { color: #666; font-size: 14px; margin-top: 10px; }

        /* Клас для анімованої фігури (Еліпс) */
        .animated-shape {
            animation: pulse-colors 4s infinite alternate ease-in-out;
        }

        @keyframes pulse-colors {
            0% {
                fill: #ff9a9e;
                stroke: #fad0c4;
            }
            50% {
                fill: #a18cd1;
                stroke: #fbc2eb;
            }
            100% {
                fill: #84fab0;
                stroke: #8fd3f4;
            }
        }
    </style>
</head>
<body>

    <h1>Мистецтво SVG</h1>

    <div class="canvas">
        
        <div class="shape-card">
            <svg width="120" height="120">
                <rect x="10" y="10" width="100" height="100" 
                      fill="#FFD700" stroke="#B8860B" stroke-width="5" />
            </svg>
            <p>Квадрат</p>
        </div>

        <div class="shape-card">
            <svg width="180" height="120">
                <rect x="10" y="25" width="160" height="70" 
                      fill="#FF5733" stroke="#900C3F" stroke-width="5" />
            </svg>
            <p>Прямокутник</p>
        </div>

        <div class="shape-card">
            <svg width="120" height="120">
                <circle cx="60" cy="60" r="50" 
                        fill="#33FFBD" stroke="#1A5276" stroke-width="5" />
            </svg>
            <p>Коло</p>
        </div>

        <div class="shape-card">
            <svg width="180" height="120">
                <ellipse cx="90" cy="60" rx="75" ry="40" 
                         class="animated-shape" stroke-width="5" />
            </svg>
            <p>Анімований еліпс</p>
        </div>

    </div>

</body>
</html>
