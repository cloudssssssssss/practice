<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwind CSS Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="max-w-sm bg-white border border-gray-200 rounded-2xl shadow-xl overflow-hidden hover:scale-105 transition-transform duration-300">
        
        <div class="h-32 bg-gradient-to-r from-blue-500 to-purple-600"></div>
        
        <div class="px-6 py-8 text-center">
            <div class="relative -mt-16 mb-4 flex justify-center">
                <img class="w-24 h-24 rounded-full border-4 border-white shadow-md" src="https://ui-avatars.com/api/?name=Cloud+User&background=random" alt="Avatar">
            </div>

            <h3 class="text-xl font-bold text-gray-900">Стас Любченко</h3>
            <p class="text-sm text-blue-600 font-medium">Fullstack JS Developer</p>
            
            <p class="mt-4 text-gray-600 text-sm">
                Майстер Tailwind CSS, приборкувач Git та творець адаптивних макетів. Люблю чистий код і швидкі інтерфейси.
            </p>

            <div class="mt-6 flex gap-2">
                <button class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg transition-colors">
                    Підписатись
                </button>
                <button class="flex-1 border border-gray-300 hover:bg-gray-50 text-gray-700 font-semibold py-2 px-4 rounded-lg transition-colors">
                    Чат
                </button>
            </div>
        </div>

        <div class="bg-gray-50 px-6 py-4 flex justify-around border-t border-gray-100">
            <div>
                <span class="block font-bold text-gray-800">12</span>
                <span class="text-xs text-gray-500 uppercase">Проєктів</span>
            </div>
            <div>
                <span class="block font-bold text-gray-800">850</span>
                <span class="text-xs text-gray-500 uppercase">Комітів</span>
            </div>
            <div>
                <span class="block font-bold text-gray-800">24</span>
                <span class="text-xs text-gray-500 uppercase">Нагороди</span>
            </div>
        </div>
    </div>

</body>
</html>
