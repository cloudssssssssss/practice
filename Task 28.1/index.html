<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>HW 28.1 - Повнофункціональні слайдери</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
        h2 { text-align: center; color: #444; }
        .slider-section { max-width: 800px; margin: 0 auto 50px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        .slider {
            position: relative;
            width: 100%;
            height: 350px;
            margin: 0 auto;
            overflow: hidden;
            border-radius: 10px;
            background: #222;
        }

        .slides-container {
            display: flex;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .slide {
            min-width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: white;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .controls {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none; /* шоб блок не перекривав кліки по крапках */
            padding: 0 10px;
            box-sizing: border-box;
        }

        .controls button {
            pointer-events: auto;
            background: rgba(0, 0, 0, 0.4);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .controls button:hover { background: rgba(0, 0, 0, 0.8); transform: scale(1.1); }
        
        .indicators {
            position: absolute;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 10px;
            z-index: 5;
        }

        .dot {
            height: 12px;
            width: 12px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .dot.active {
            background: white;
            transform: scale(1.3);
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
    </style>
</head>
<body>

    <div class="slider-section">
        <h2>Версія на КЛАСАХ (ES6 Classes)</h2>
        <p style="text-align: center; font-size: 0.9rem; color: #777;">Автопауза при наведенні миші</p>
        <div id="class-slider" class="slider">
            <div class="slides-container">
                <div class="slide" style="background: linear-gradient(45deg, #3498db, #2980b9);">Слайд 1</div>
                <div class="slide" style="background: linear-gradient(45deg, #e67e22, #d35400);">Слайд 2</div>
                <div class="slide" style="background: linear-gradient(45deg, #9b59b6, #8e44ad);">Слайд 3</div>
                <div class="slide" style="background: linear-gradient(45deg, #1abc9c, #16a085);">Слайд 4</div>
            </div>
        </div>
    </div>

    <div class="slider-section">
        <h2>Версія на ПРОТОТИПАХ</h2>
        <div id="proto-slider" class="slider">
            <div class="slides-container">
                <div class="slide" style="background: #2ecc71;">Proto A</div>
                <div class="slide" style="background: #e74c3c;">Proto B</div>
                <div class="slide" style="background: #f1c40f;">Proto C</div>
            </div>
        </div>
    </div>

    <script>
        /**
         * 1. ВЕРСІЯ НА КЛАСАХ
         */
        class ClassSlider {
            constructor(selector, config = {}) {
                this.slider = document.querySelector(selector);
                this.container = this.slider.querySelector('.slides-container');
                this.slides = this.slider.querySelectorAll('.slide');
                
                this.config = {
                    interval: config.interval || 3000,
                    showDots: config.showDots ?? true
                };

                this.currentIndex = 0;
                this.timer = null;

                this.init();
            }

            init() {
                this.renderUI();
                this.bindEvents();
                this.start();
            }

            renderUI() {
                // кнопки
                const ctrl = document.createElement('div');
                ctrl.className = 'controls';
                ctrl.innerHTML = `<button class="p">❮</button><button class="n">❯</button>`;
                this.slider.appendChild(ctrl);
                
                this.prevBtn = ctrl.querySelector('.p');
                this.nextBtn = ctrl.querySelector('.n');

                // крапки
                if (this.config.showDots) {
                    const ind = document.createElement('div');
                    ind.className = 'indicators';
                    this.slides.forEach((_, i) => {
                        const dot = document.createElement('span');
                        dot.className = 'dot';
                        dot.addEventListener('click', () => this.goTo(i));
                        ind.appendChild(dot);
                    });
                    this.slider.appendChild(ind);
                    this.dots = ind.querySelectorAll('.dot');
                    this.updateDots();
                }
            }

            goTo(idx) {
                if (idx >= this.slides.length) this.currentIndex = 0;
                else if (idx < 0) this.currentIndex = this.slides.length - 1;
                else this.currentIndex = idx;

                this.container.style.transform = `translateX(-${this.currentIndex * 100}%)`;
                this.updateDots();
            }

            next() { this.goTo(this.currentIndex + 1); }
            prev() { this.goTo(this.currentIndex - 1); }

            start() { 
                this.stop(); 
                this.timer = setInterval(() => this.next(), this.config.interval); 
            }
            
            stop() { clearInterval(this.timer); }

            updateDots() {
                if (this.dots) {
                    this.dots.forEach((d, i) => d.classList.toggle('active', i === this.currentIndex));
                }
            }

            bindEvents() {
                this.nextBtn.onclick = () => { this.next(); this.start(); };
                this.prevBtn.onclick = () => { this.prev(); this.start(); };
                
                this.slider.onmouseenter = () => this.stop();
                this.slider.onmouseleave = () => this.start();
            }
        }

        /**
         * 2. ВЕРСІЯ НА ПРОТОТИПАХ
         */
        function ProtoSlider(selector, interval) {
            this.slider = document.querySelector(selector);
            this.container = this.slider.querySelector('.slides-container');
            this.slides = this.slider.querySelectorAll('.slide');
            this.currentIndex = 0;
            this.interval = interval || 2500;
            
            this.render();
        }

        ProtoSlider.prototype.render = function() {
            const btnWrap = document.createElement('div');
            btnWrap.className = 'controls';
            btnWrap.innerHTML = `<button class="p">❮</button><button class="n">❯</button>`;
            this.slider.appendChild(btnWrap);

            btnWrap.querySelector('.n').onclick = () => this.move(1);
            btnWrap.querySelector('.p').onclick = () => this.move(-1);
        };

        ProtoSlider.prototype.move = function(dir) {
            this.currentIndex += dir;
            if (this.currentIndex >= this.slides.length) this.currentIndex = 0;
            if (this.currentIndex < 0) this.currentIndex = this.slides.length - 1;
            
            this.container.style.transform = `translateX(-${this.currentIndex * 100}%)`;
        };

        window.onload = () => {
            new ClassSlider('#class-slider', { interval: 4000 });
            new ProtoSlider('#proto-slider', 3000);
        };
    </script>
</body>
</html>
