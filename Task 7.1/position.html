<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Позиціонування елементів</title>
    <style>
        body { height: 2500px; padding-top: 60px; }
        .fixed-nav { position: fixed; top: 0; left: 0; width: 100%; background: gold; padding: 15px; text-align: center; z-index: 100; }
        .sticky-item { position: sticky; top: 70px; background: cyan; padding: 15px; margin: 20px 0; }
        .relative-parent { position: relative; top: 40px; left: 40px; background: lightgrey; width: 300px; height: 150px; border: 1px solid #333; }
        .absolute-child { position: absolute; bottom: 0; right: 0; background: red; color: white; padding: 5px; }
    </style>
</head>
<body>
    <div class="fixed-nav">Фіксована панель (завжди зверху)</div>
    
    <div class="relative-parent">
        Блок з відносним позиціонуванням
        <div class="absolute-child">Абсолютний блок</div>
    </div>

    <div class="sticky-item">Блок зі sticky (залишається у полі зору при скролі)</div>
    
    <p>Прокрутіть сторінку нижче, щоб побачити ефект sticky та fixed позиціонування.</p>
</body>
</html>
