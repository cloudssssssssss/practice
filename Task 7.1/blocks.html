<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Блокова модель та типи відображення</title>
    <style>
        .box { background: lightcoral; padding: 20px; border: 5px solid black; margin: 10px; width: 150px; }
        .inline-text { background: yellow; }
        .flex-box { display: flex; background: #eee; height: 100px; align-items: center; justify-content: space-around; }
        .border-box { box-sizing: border-box; }
        .content-box { box-sizing: content-box; }
    </style>
</head>
<body>
    <div class="box">Це блок (div)</div>
    <span class="inline-text">Це інлайн (span)</span>
    
    <h3>Демонстрація Flex:</h3>
    <div class="flex-box">
        <div style="background: white; padding: 10px;">Елемент 1</div>
        <div style="background: white; padding: 10px;">Елемент 2</div>
    </div>

    <h3>Розрахунок розмірів (Box Sizing):</h3>
    <div class="box content-box">Content-box (елемент став ширшим через падінги)</div>
    <div class="box border-box">Border-box (розмір залишився 150px)</div>
</body>
</html>
