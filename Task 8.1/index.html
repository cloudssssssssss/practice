<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Task 8.1 - Float Layout</title>
    <style>
        .container {
            width: 800px;
            margin: 20px auto;
            border: 2px solid #333;
            padding: 10px;
            background: #f9f9f9;
        }

        .container::after {
            content: "";
            display: table;
            clear: both;
        }

        .box {
            background: #ccc;
            border: 1px solid #777;
            width: 100px;
            height: 50px;
            text-align: center;
            line-height: 50px;
        }

        .large-box {
            width: 150px;
            height: 110px;
            line-height: 110px;
        }

        .task-1 .left { float: left; }
        .task-1 .right { float: right; }

        .task-2 .left { float: left; }
        .task-2 .right { float: right; margin-left: 5px; }

        .task-3 .left { float: left; margin-right: 5px; }
        .task-3 .right { float: right; margin-left: 5px; }

        .task-4 .right-group { float: right; }
        .task-4 .big { float: left; margin-right: 5px; }
        .task-4 .small { float: left; clear: left; margin-top: 10px; }

        .task-5-wrapper {
            width: fit-content;
            margin: 0 auto;
        }
        .task-5 .big { float: left; margin-right: 5px; }
        .task-5 .small-container { float: left; }
        .task-5 .small { float: none; margin-bottom: 10px; }

        h3 { clear: both; padding-top: 20px; font-family: sans-serif; }
    </style>
</head>
<body>

    <h3>1. Один ліворуч, другий праворуч</h3>
    <div class="container task-1">
        <div class="box left"></div>
        <div class="box right"></div>
    </div>

    <h3>2. Один ліворуч, кілька праворуч</h3>
    <div class="container task-2">
        <div class="box left"></div>
        <div class="box right"></div>
        <div class="box right"></div>
        <div class="box right"></div>
    </div>

    <h3>3. Два ліворуч, два праворуч</h3>
    <div class="container task-3">
        <div class="box left"></div>
        <div class="box left"></div>
        <div class="box right"></div>
        <div class="box right"></div>
    </div>

    <h3>4. Три праворуч (два один під одним)</h3>
    <div class="container task-4">
        <div class="right-group">
            <div class="box large-box big"></div>
            <div class="small-wrap" style="float:left">
                <div class="box small"></div>
                <div class="box small" style="margin-top:10px"></div>
            </div>
        </div>
    </div>

    <h3>5. Три по центру (два один під одним)</h3>
    <div class="container">
        <div class="task-5-wrapper task-5">
            <div class="box large-box big"></div>
            <div class="small-container">
                <div class="box small"></div>
                <div class="box small"></div>
            </div>
        </div>
    </div>

</body>
</html>
